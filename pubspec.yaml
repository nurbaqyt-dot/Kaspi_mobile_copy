name: kaspi
description: Flutter Kaspi.kz style clone backed by Firebase.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  cached_network_image: ^3.4.1
  cloud_firestore: ^5.6.9
  crypto: ^3.0.6
  cupertino_icons: ^1.0.8
  firebase_auth: ^5.6.0
  firebase_core: ^3.15.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^10.3.1
  go_router: ^16.0.0
  google_sign_in: ^6.2.2
  image: ^4.5.4
  image_picker: ^1.1.2
  intl: ^0.20.2
  mobile_scanner: ^6.0.11
  http: ^1.6.0
  permission_handler: ^11.4.0
  share_plus: ^10.1.4
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/icons/inbox/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
